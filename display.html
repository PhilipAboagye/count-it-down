<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Countdown Display</title>
    <!-- Google Font: Roboto Mono for non-shaking text -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        /* ---------------------------------- */
        /* DARK MODE & LAYOUT FOR DISPLAY TAB */
        /* ---------------------------------- */
        body { 
            background: #121212 !important; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            flex-direction: column; 
            /* Use the standard sans-serif for the title */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            /* FIX 2: Increased max-width to allow for a bigger font */
            max-width: 1800px;
        }

        #event-title-display {
            font-size: 6vw;
            font-weight: 300;
            color: #d1d5db;
            margin-bottom: 20px;
            text-align: center;
            min-height: 5vw;
        }

        .timer {
            background: none !important;
            box-shadow: none !important;
            padding: 0;
            display: flex;
            flex-direction: row; 
            align-items: baseline;
            justify-content: center;
            z-index: 1; 
            color: #00FFC0;
            transition: color 0.3s ease-in-out;
            white-space: nowrap;

            /* FIX 1: Apply the monospace font to the entire timer block */
            font-family: 'Roboto Mono', monospace;
        }
        
        /* FIX 2: Increased font sizes */
        .timer__part {
            font-size: 18vw; /* Was 14vw */
            font-weight: 300;
            padding: 0 5px;
            letter-spacing: -3px;
            line-height: 1;
        }
        
        .timer__part--colon {
            font-size: 14vw; /* Was 10vw */
            font-weight: 700; /* Bolder colon */
            letter-spacing: normal;
        }

        .timer__part--milliseconds {
            font-size: 10vw; /* Was 6vw */
            font-weight: 500;
            color: #6b7280;
            letter-spacing: normal;
            margin-left: 5px;
            transition: color 0.3s ease-in-out;
        }
        
        .timer__part--hours,
        .timer__colon--hours {
            display: none;
        }
        
        .timer--show-hours .timer__part--hours,
        .timer--show-hours .timer__colon--hours {
            display: inline;
        }


         /* ---------------------------------- */
        /* NEW: PROGRESS BAR */
        /* ---------------------------------- */
        #progress-bar-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background-color: #333;
            overflow: hidden;
            z-index: 500;
        }
        
        #progress-bar {
            height: 100%;
            width: 100%; /* Start at 100% */
            background-color: #00FFC0;
            /* Smooth transition for width changes */
            transition: width 0.1s linear, background-color 0.5s ease; 
        }

        /* URGENCY: Red progress bar */
        #progress-bar.urgency-bar {
            background-color: #FF4136;
        }


        /* Urgency Warning */
        .timer--warning {
            color: #ef4444;
            animation: pulse 1s infinite;
        }
        .timer--warning .timer__part--milliseconds {
            color: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .btn { 
            display: none !important;
        }

        /* ---------------------------------- */
        /* COMPLETION OVERLAY STYLES */
        /* ---------------------------------- */
        #completion-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            display: none; 
            opacity: 0;
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            background-image: url('image_8086d5.gif'); 
            transition: opacity 2s ease-in-out; 
        }

        #completion-overlay.show {
            display: block;
            opacity: 1;
        }

        @media (max-width: 600px) {
            #event-title-display {
                font-size: 8vw;
                min-height: 9vw;
            }
            /* FIX 2: Increased mobile font sizes */
            .timer__part {
                font-size: 22vw; /* Was 18vw */
                padding: 0 2px;
            }
            .timer__part--colon {
                font-size: 16vw; /* Was 12vw */
            }
            .timer__part--milliseconds {
                font-size: 12vw; /* Was 8vw */
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="timer-container">
        <!-- Event Title Display -->
        <div id="event-title-display"></div>
        
        <!-- The timer will be updated by displayScript.js -->
        <div class="timer"></div> 
    </div>

    <!-- NEW: Progress Bar Container -->
    <div id="progress-bar-container">
        <div id="progress-bar"></div>
    </div>

    <!-- Overlay container -->
    <div id="completion-overlay"></div>
    
    <script src="displayScript.js"></script>
</body>
</html>
