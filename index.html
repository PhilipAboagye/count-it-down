<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Countdown Settings</title>
    <!-- Load Tailwind for modern, responsive utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Custom style for the image preview */
        #image-preview {
            max-height: 150px;
            object-fit: cover;
        }
        /* Style for the custom file button */
        .file-input-button {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
        }
    </style>
</head>
<body class="bg-[#121212] flex flex-col items-center justify-center min-h-screen p-4 font-sans">

    <!-- Main Container -->
    <div id="app-container" class="bg-gray-800/50 backdrop-blur-md rounded-3xl p-8 shadow-2xl w-full max-w-6xl transition-all duration-500 border border-gray-700">
        
        <h1 class="text-3xl font-light text-white mb-8 text-center tracking-wider">Countdown Controller</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">

            <!-- ---------------------------------------------------- -->
            <!-- 1. SETTINGS PANEL (Column 1) -->
            <!-- ---------------------------------------------------- -->
            <div id="settings-panel" class="space-y-6">
                
                <div>
                    <label for="event-title" class="text-gray-300 mb-2 text-sm font-medium">Event Title (Optional)</label>
                    <input type="text" id="event-title" placeholder="e.g., Next Speaker: John Doe"
                           class="w-full text-center text-lg font-mono p-3 rounded-xl bg-gray-700 border-2 border-gray-600 focus:border-[#00FFC0] text-white transition duration-200 shadow-inner">
                </div>

                <h2 class="text-xl font-bold text-[#00FFC0] border-b border-[#00FFC0]/30 pb-2">Set Duration</h2>
                
                <div class="flex space-x-4 items-center justify-center">
                    <!-- Minutes Input -->
                    <div class="flex flex-col items-center w-1/2">
                        <label for="input-minutes" class="text-gray-300 mb-2 text-sm font-medium">Minutes</label>
                        <input type="number" id="input-minutes" value="15" min="0" max="999"
                               class="w-full text-center text-3xl font-mono p-3 rounded-xl bg-gray-700 border-2 border-gray-600 focus:border-[#00FFC0] text-white transition duration-200 shadow-inner appearance-none">
                    </div>

                    <!-- Seconds Input -->
                    <div class="flex flex-col items-center w-1/2">
                        <label for="input-seconds" class="text-gray-300 mb-2 text-sm font-medium">Seconds</label>
                        <input type="number" id="input-seconds" value="0" min="0" max="59"
                               class="w-full text-center text-3xl font-mono p-3 rounded-xl bg-gray-700 border-2 border-gray-600 focus:border-[#00FFC0] text-white transition duration-200 shadow-inner appearance-none">
                    </div>
                </div>

                <!-- Start Button -->
                <button id="start-btn" 
                        class="w-full py-4 rounded-xl bg-[#00FFC0] text-[#121212] font-extrabold text-lg flex items-center justify-center space-x-2 shadow-lg hover:shadow-[#00FFC0]/50 transition duration-300 transform hover:scale-[1.02]">
                    <span class="material-icons text-xl">play_circle_outline</span>
                    <span>START COUNTDOWN</span>
                </button>

                <!-- Quick Start (Sync to Clock) Section -->
                <div class="pt-4 space-y-4">
                     <h2 class="text-xl font-bold text-[#00FFC0] border-b border-[#00FFC0]/30 pb-2">Quick Start (Sync to Clock)</h2>
                     <div class="flex space-x-4">
                        <button id="sync-minute-btn" 
                                class="w-1/2 py-3 rounded-xl bg-blue-600 text-white font-bold text-sm flex items-center justify-center space-x-2 shadow-lg hover:bg-blue-700 transition duration-300 transform hover:scale-[1.02]">
                            <span class="material-icons text-lg">sync</span>
                            <span>TO TOP OF MINUTE</span>
                        </button>
                        <button id="sync-hour-btn" 
                                class="w-1/2 py-3 rounded-xl bg-purple-600 text-white font-bold text-sm flex items-center justify-center space-x-2 shadow-lg hover:bg-purple-700 transition duration-300 transform hover:scale-[1.02]">
                            <span class="material-icons text-lg">sync</span>
                            <span>TO TOP OF HOUR</span>
                        </button>
                     </div>
                </div>

                <!-- NEW: Completion Image Upload -->
                <div class="pt-4 space-y-4">
                    <h2 class="text-xl font-bold text-[#00FFC0] border-b border-[#00FFC0]/30 pb-2">Completion Image</h2>
                    <div class="flex space-x-4">
                        <!-- Custom styled button that triggers the hidden file input -->
                        <label for="image-upload" 
                               class="file-input-button w-2/3 rounded-xl bg-gray-600 text-white font-bold text-sm hover:bg-gray-700 transition duration-300">
                            <span class="material-icons text-lg mr-2">upload_file</span>
                            UPLOAD IMAGE
                        </label>
                        <!-- The actual file input, hidden -->
                        <input type="file" id="image-upload" accept="image/*" class="hidden">
                        
                        <button id="clear-image-btn"
                                class="w-1/3 py-3 rounded-xl bg-red-600/70 text-white font-bold text-sm hover:bg-red-600 transition duration-300 hidden">
                            CLEAR
                        </button>
                    </div>
                    <!-- Image Preview -->
                    <img id="image-preview" src="" alt="Image Preview" class="w-full rounded-lg hidden mt-4">
                </div>

            </div>

            <!-- ---------------------------------------------------- -->
            <!-- 2. STATUS DISPLAY (Column 2) -->
            <!-- ---------------------------------------------------- -->
            <div id="status-panel">
                <h2 class="text-xl font-bold text-gray-300 mb-4 text-center">Current Status</h2>
                
                <!-- Local Time Display -->
                <div id="local-timer-display" class="timer flex justify-center items-center text-6xl font-mono text-white mb-4">
                    <!-- Time parts injected here -->
                </div>

                <!-- On-the-fly Controls -->
                <div id="adjust-controls" class="flex justify-center space-x-4 mb-6">
                    <button id="add-time-btn"
                            class="px-4 py-2 rounded-lg bg-green-600/50 text-white font-semibold text-sm hover:bg-green-600 transition duration-200">
                        + 1 Min
                    </button>
                     <button id="subtract-time-btn"
                            class="px-4 py-2 rounded-lg bg-red-600/50 text-white font-semibold text-sm hover:bg-red-600 transition duration-200">
                        - 30 Sec
                    </button>
                </div>

                <!-- Main Controls (Play/Pause/Stop) -->
                <div id="controls" class="flex justify-center space-x-6">
                    
                    <button id="control-btn" data-action="play"
                            class="p-4 rounded-full bg-blue-600 text-white shadow-lg hover:bg-blue-700 transition duration-200 transform hover:scale-105">
                        <span class="material-icons text-3xl">play_arrow</span>
                    </button>
                    
                    <button id="reset-btn" data-action="reset"
                            class="p-4 rounded-full bg-red-600 text-white shadow-lg hover:bg-red-700 transition duration-200 transform hover:scale-105">
                        <span class="material-icons text-3xl">replay</span>
                    </button>
                    
                    <button id="open-display-btn" 
                            class="p-4 rounded-full bg-purple-600 text-white shadow-lg hover:bg-purple-700 transition duration-200 transform hover:scale-105">
                        <span class="material-icons text-3xl">open_in_new</span>
                    </button>
                </div>
            </div>
            
        </div> <!-- End of grid wrapper -->

    </div> <!-- End of app-container -->

    <script src="controlScript.js"></script>

</body>
</html>
